services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /data/listings.db
      IMAGE_RAG_BASE_URL: http://image-rag:8002
    volumes:
      - listings_data:/data
      - .:/app
  mcp:
    build:
      context: .
    command: uvicorn apps_sdk.server.main:app --host 0.0.0.0 --port 8001
    environment:
      APPS_SDK_LISTINGS_API_BASE_URL: http://api:8000
      APPS_SDK_PUBLIC_BASE_URL: http://localhost:8001
      APPS_SDK_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      - api
    volumes:
      - .:/app
  image-rag:
    build:
      context: .
    command: uvicorn services.image_rag.main:app --host 0.0.0.0 --port 8002
    environment:
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /data/listings.db
      IMAGE_RAG_DB_URI: /data/image-rag/milvus.db
      IMAGE_RAG_STATE_DB: /data/image-rag/state.db
      IMAGE_RAG_DEVICE: cpu
      IMAGE_RAG_SYNC_ON_START: "true"
    ports:
      - "8002:8002"
    volumes:
      - listings_data:/data
      - .:/app

volumes:
  listings_data:
